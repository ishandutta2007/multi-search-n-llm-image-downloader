<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="100%" height="100%">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A2980" />
      <stop offset="100%" stop-color="#26D0CE" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.3" />
    </filter>
  </defs>
  
  <rect width="800" height="200" fill="url(#bg)" rx="15" ry="15" />
  
  <g filter="url(#shadow)">
    <text x="400" y="90" font-family="Arial, Helvetica, sans-serif" font-weight="bold" font-size="38" fill="#ffffff" text-anchor="middle">Multi Search &amp; LLM Image Downloader</text>
    <text x="400" y="140" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#e0f7fa" text-anchor="middle">Fast, Reliable Bulk Image Scraping for AI Models &amp; Datasets</text>
  </g>
  
  <g transform="translate(50, 70)" opacity="0.8">
    <circle cx="20" cy="20" r="10" fill="#fff" opacity="0.5"/>
    <circle cx="60" cy="50" r="15" fill="#fff" opacity="0.3"/>
    <circle cx="10" cy="80" r="8" fill="#fff" opacity="0.6"/>
  </g>
  
  <g transform="translate(680, 50)" opacity="0.8">
    <circle cx="30" cy="10" r="12" fill="#fff" opacity="0.4"/>
    <circle cx="10" cy="60" r="18" fill="#fff" opacity="0.3"/>
    <circle cx="50" cy="90" r="9" fill="#fff" opacity="0.5"/>
  </g>
</svg>
